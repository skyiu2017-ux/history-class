/* ── 히어로 통계 ── */
document.getElementById('totalTopics').textContent = SUMMARIES.length;

/* ── 시대 탭 ── */
const eras = ['전체', ...new Set(SUMMARIES.map(s => s.era))];
const tabsEl = document.getElementById('eraTabs');
tabsEl.innerHTML = eras.map((e, i) =>
  `<button class="era-tab ${i===0?'active':''}" onclick="filterEra('${e}', this)">${e === '전체' ? '📌 전체' : e}</button>`
).join('');

let currentEra = '전체';
function filterEra(era, btn) {
  currentEra = era;
  document.querySelectorAll('.era-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSummaries();
}

/* ── 렌더링 ── */
function renderSummaries(searchQuery) {
  const container = document.getElementById('summaryContainer');
  let filtered = SUMMARIES;

  if (currentEra !== '전체') {
    filtered = filtered.filter(s => s.era === currentEra);
  }
  if (searchQuery) {
    const q = searchQuery.toLowerCase().replace(/\s/g, '');
    filtered = filtered.filter(s =>
      s.title.toLowerCase().replace(/\s/g, '').includes(q) ||
      s.oneLiner.toLowerCase().replace(/\s/g, '').includes(q) ||
      s.keyPoints.some(p => p.toLowerCase().replace(/\s/g, '').includes(q)) ||
      s.details.some(d => d.value.toLowerCase().replace(/\s/g, '').includes(q))
    );
  }

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results">😅 검색 결과가 없습니다. 다른 키워드로 검색해 보세요.</div>';
    return;
  }

  const grouped = {};
  filtered.forEach(s => {
    if (!grouped[s.era]) grouped[s.era] = [];
    grouped[s.era].push(s);
  });

  let html = '';
  for (const [era, items] of Object.entries(grouped)) {
    html += `<div class="sec"><div class="era-heading fade-in">${getEraIcon(era)} ${era} <span style="font-size:0.78rem;color:var(--dim);font-weight:400;">(${items.length}개 주제)</span></div>`;
    items.forEach((s, i) => {
      html += `
        <div class="summary-card fade-in d${Math.min(i+1,4)}">
          <div class="summary-header" onclick="toggleCard(this)">
            <div>
              <h3><span class="icon">${s.icon}</span> ${s.title}</h3>
              <div class="summary-meta">
                <span class="summary-tag tag-era">${s.era}</span>
                <span class="summary-tag tag-page">${s.page}</span>
              </div>
            </div>
            <span class="summary-toggle">▾</span>
          </div>
          <div class="summary-body">
            <div class="one-liner">💬 ${s.oneLiner}</div>
            <div class="key-points">
              ${s.keyPoints.map(p => `<div class="key-point"><span>${p}</span></div>`).join('')}
            </div>
            <div class="detail-grid">
              ${s.details.map(d => `<div class="detail-item"><div class="d-label">${d.label}</div><div class="d-value">${d.value}</div></div>`).join('')}
            </div>
            <a class="lesson-link" href="${s.url}">📖 수업 페이지에서 더 알아보기 →</a>
          </div>
        </div>`;
    });
    html += '</div>';
  }
  container.innerHTML = html;

  // 애니메이션 재적용
  const obs = new IntersectionObserver(e => {
    e.forEach(x => { if (x.isIntersecting) { x.target.style.animationPlayState = 'running'; obs.unobserve(x.target); } });
  }, { threshold: 0.1 });
  container.querySelectorAll('.fade-in').forEach(el => { el.style.animationPlayState = 'paused'; obs.observe(el); });
}

function getEraIcon(era) {
  const icons = { '조선 전기': '🏯', '조선 중기': '⚔️', '조선 후기': '👑', '근대': '⚓', '현대': '🇰🇷' };
  return icons[era] || '📖';
}

function toggleCard(header) {
  const card = header.closest('.summary-card');
  card.classList.toggle('open');
}

/* ── 검색 ── */
document.getElementById('summarySearch').addEventListener('input', function() {
  renderSummaries(this.value);
});

/* ── 초기 렌더링 ── */
renderSummaries();
</script>
