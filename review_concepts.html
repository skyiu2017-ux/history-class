let mode='summary', tab='u1';
function hBg(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgba(${r},${g},${b},0.1)`}

function toc(d){return d.map((u,i)=>`<button class="toc-card fade-in ${i>0?'d'+Math.min(i,4):''}" onclick="go('${u.id}')"><div class="toc-num" style="background:${u.c};">${u.n}</div><span class="toc-label">${u.t}</span></button>`).join('')+`<button class="toc-card fade-in d4" onclick="go('all')" style="border:2px dashed rgba(0,0,0,0.12);"><div class="toc-num" style="background:var(--slate);">全</div><span class="toc-label">전체 보기</span></button>`}

function tabs(d){return d.map(u=>`<button class="tab-btn" data-tab="${u.id}" onclick="go('${u.id}')">${u.n}</button>`).join('')+`<button class="tab-btn" data-tab="all" onclick="go('all')">전체</button>`}

function summaryHTML(){return S.map(u=>`<div class="unit-panel" id="panel-${u.id}"><div class="unit-divider"><span class="unit-divider-label" style="background:${hBg(u.c)};color:${u.c};">📖 ${u.n}단원</span><div class="unit-divider-title">${u.t}</div></div><div class="flow-banner fade-in"><span class="flow-icon">🔗</span><span class="flow-text">${u.f}</span></div><div class="concept-list">${u.i.map((c,j)=>`<div class="concept-card fade-in ${j>0?'d'+Math.min(j,4):''}"><div class="concept-term">${c.t}</div><p class="concept-desc">${c.d}</p></div>`).join('')}</div></div>`).join('')}

function easyHTML(){return E.map(u=>`<div class="unit-panel" id="panel-${u.id}"><div class="unit-divider"><span class="unit-divider-label" style="background:${hBg(u.c)};color:${u.c};">💡 ${u.n}단원</span><div class="unit-divider-title">${u.t}</div></div><div class="concept-list">${u.i.map((c,j)=>`<div class="easy-card fade-in ${j>0?'d'+Math.min(j,4):''}" style="border-left-color:${u.c};"><div class="easy-term"><span>${c.t}</span><span class="etag">의미 풀이</span></div><p class="easy-desc">${c.d}</p></div>`).join('')}</div></div>`).join('')}

function render(){
  const d=mode==='summary'?S:E;
  document.getElementById('toc-grid').innerHTML=toc(d);
  document.getElementById('tab-nav').innerHTML=tabs(d);
  document.getElementById('units-container').innerHTML=mode==='summary'?summaryHTML():easyHTML();
  go(tab);
}

function switchMode(m){mode=m;document.querySelectorAll('.mode-btn').forEach(b=>b.classList.toggle('active',b.dataset.mode===m));render()}

function go(id){
  tab=id;const ct=document.getElementById('units-container'),ps=ct.querySelectorAll('.unit-panel');
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===id));
  if(id==='all'){ct.classList.add('all-units');ps.forEach(p=>p.classList.add('active'));}
  else{ct.classList.remove('all-units');ps.forEach(p=>p.classList.toggle('active',p.id==='panel-'+id));}
  const tgt=id==='all'?ps[0]:document.getElementById('panel-'+id);
  if(tgt)setTimeout(()=>tgt.scrollIntoView({behavior:'smooth',block:'start'}),50);
  ct.querySelectorAll('.fade-in').forEach(el=>{el.style.animation='none';el.offsetHeight;el.style.animation='';});
}

render();
</script>
