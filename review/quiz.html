<style>
:root{--bg:#F5F4F0;--bg-card:rgba(255,255,255,0.72);--glass:rgba(255,255,255,0.55);--text:#1A1A1A;--sub:#555;--dim:#999;--blue:#2563EB;--blue-bg:#EFF6FF;--navy:#1E3A5F;--navy-bg:#F0F4F8;--orange:#D97706;--orange-bg:#FFFBEB;--purple:#7C3AED;--purple-bg:#F5F3FF;--green:#059669;--green-bg:#ECFDF5;--red:#DC2626;--red-bg:#FEF2F2;--max-w:820px;--r-sm:10px;--r-md:16px;--r-lg:22px;--shadow:0 1px 3px rgba(0,0,0,0.04),0 4px 14px rgba(0,0,0,0.06);--shadow-h:0 2px 8px rgba(0,0,0,0.06),0 10px 28px rgba(0,0,0,0.1)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.7;-webkit-font-smoothing:antialiased}a{color:inherit;text-decoration:none}.container{max-width:var(--max-w);margin:0 auto;padding:0 18px}
.site-header{position:sticky;top:0;z-index:100;background:rgba(245,244,240,0.82);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid rgba(0,0,0,0.06)}.header-inner{display:flex;align-items:center;justify-content:space-between;height:54px;max-width:var(--max-w);margin:0 auto;padding:0 18px}.site-brand{font-weight:700;font-size:1rem;color:var(--navy)}.back-btn{display:inline-flex;align-items:center;gap:4px;font-size:0.85rem;font-weight:600;color:var(--blue);padding:6px 12px;border-radius:8px;transition:background 0.15s}.back-btn:hover{background:var(--blue-bg)}
.hero{background:linear-gradient(135deg,#1B2A4A 0%,#2C4A7C 50%,#3A5F90 100%);color:#fff;padding:44px 0 36px;position:relative;overflow:hidden}.hero::after{content:'';position:absolute;top:-35%;right:-15%;width:360px;height:360px;background:radial-gradient(circle,rgba(255,255,255,0.06) 0%,transparent 70%);border-radius:50%;pointer-events:none}.hero-inner{position:relative;z-index:1}.hero-eye{font-size:0.78rem;font-weight:500;letter-spacing:0.06em;opacity:0.65;margin-bottom:10px}.hero h1{font-size:clamp(1.35rem,4.5vw,1.9rem);font-weight:700;line-height:1.4;letter-spacing:-0.02em;margin-bottom:8px}.hero-desc{font-size:0.88rem;opacity:0.78;max-width:460px}
/* 주제 선택 */
.topic-screen,.quiz-screen,.result-screen{display:none}.topic-screen.active,.quiz-screen.active,.result-screen.active{display:block}
.era-group{margin-bottom:16px}.era-group-title{font-size:0.85rem;font-weight:700;color:var(--navy);margin-bottom:8px;padding-bottom:4px;border-bottom:2px solid var(--navy-bg)}
.topic-grid{display:grid;grid-template-columns:1fr;gap:6px}@media(min-width:500px){.topic-grid{grid-template-columns:1fr 1fr}}
.topic-check{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg-card);border:1px solid var(--glass);border-radius:var(--r-sm);cursor:pointer;transition:all 0.15s;font-size:0.84rem;user-select:none}.topic-check:hover{background:rgba(255,255,255,0.92)}.topic-check.checked{background:var(--blue-bg);border-color:rgba(37,99,235,0.2)}.topic-check input{display:none}.topic-cb{width:20px;height:20px;border:2px solid var(--dim);border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:0.7rem;color:transparent}.topic-check.checked .topic-cb{background:var(--blue);border-color:var(--blue);color:#fff}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}.btn{display:inline-flex;align-items:center;gap:5px;padding:12px 24px;border-radius:12px;font-size:0.9rem;font-weight:700;cursor:pointer;border:none;transition:all 0.15s}.btn:active{transform:scale(0.97)}.btn-primary{background:var(--navy);color:#fff}.btn-primary:hover{background:#142D4C}.btn-outline{background:rgba(0,0,0,0.04);color:var(--sub)}.btn-outline:hover{background:rgba(0,0,0,0.08)}
/* 퀴즈 */
.progress-wrap{margin-bottom:20px}.progress-info{display:flex;justify-content:space-between;font-size:0.78rem;color:var(--dim);margin-bottom:6px}.progress-bar{height:6px;background:rgba(0,0,0,0.06);border-radius:3px;overflow:hidden}.progress-fill{height:100%;background:var(--blue);border-radius:3px;transition:width 0.3s}
.q-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--glass);border-radius:var(--r-lg);padding:24px;box-shadow:var(--shadow)}.q-topic{font-size:0.72rem;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:10px}.q-text{font-size:0.95rem;font-weight:600;line-height:1.6;margin-bottom:18px}
.options{display:flex;flex-direction:column;gap:8px}.opt-btn{display:flex;align-items:flex-start;gap:10px;padding:14px 16px;background:rgba(240,244,248,0.6);border:2px solid transparent;border-radius:var(--r-sm);cursor:pointer;font-size:0.88rem;line-height:1.5;transition:all 0.15s;text-align:left;width:100%;font-family:inherit}.opt-btn:hover:not(.disabled){background:rgba(219,234,254,0.5);border-color:var(--blue)}.opt-num{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;background:rgba(0,0,0,0.06);flex-shrink:0;margin-top:1px}
.opt-btn.correct{background:var(--green-bg);border-color:var(--green)}.opt-btn.correct .opt-num{background:var(--green);color:#fff}
.opt-btn.wrong{background:var(--red-bg);border-color:var(--red)}.opt-btn.wrong .opt-num{background:var(--red);color:#fff}
.opt-btn.disabled{cursor:default;opacity:0.7}.opt-btn.show-correct{background:var(--green-bg);border-color:rgba(5,150,105,0.3)}
.feedback{margin-top:16px;padding:14px 16px;border-radius:var(--r-sm);font-size:0.85rem;line-height:1.6;display:none}.feedback.show{display:block}.feedback.correct-fb{background:var(--green-bg);border-left:4px solid var(--green)}.feedback.wrong-fb{background:var(--red-bg);border-left:4px solid var(--red)}.feedback strong{display:block;margin-bottom:4px}
.next-wrap{margin-top:16px;text-align:right}
/* 결과 */
.result-card{background:var(--bg-card);backdrop-filter:blur(10px);border:1px solid var(--glass);border-radius:var(--r-lg);padding:32px;box-shadow:var(--shadow);text-align:center}.result-emoji{font-size:3rem;margin-bottom:10px}.result-score{font-size:2rem;font-weight:800;color:var(--navy)}.result-sub{font-size:0.9rem;color:var(--sub);margin:8px 0 20px}.result-detail{font-size:0.85rem;color:var(--dim);margin-bottom:20px}
.wrong-review{text-align:left;margin-top:20px}.wrong-review h3{font-size:0.92rem;font-weight:700;margin-bottom:12px;color:var(--red)}.wrong-item{padding:12px 14px;background:var(--red-bg);border-radius:var(--r-sm);margin-bottom:8px;font-size:0.84rem;line-height:1.5}.wrong-item .wi-q{font-weight:600;margin-bottom:4px}.wrong-item .wi-a{color:var(--green)}
.site-footer{padding:28px 0 48px;text-align:center;font-size:0.78rem;color:var(--dim);border-top:1px solid rgba(0,0,0,0.06)}.site-footer p+p{margin-top:3px}
@media(prefers-reduced-motion:no-preference){.fade-in{opacity:0;transform:translateY(10px);animation:fadeUp .4s ease forwards}@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}}

<header class="site-header"><div class="header-inner">
<a class="site-brand" href="../index.html">📘 문시중 역사 클래스</a>

<h1 class="fade-in">✅ 확인 퀴즈</h1>

</div></section>
<main class="container" style="padding-top:24px;padding-bottom:40px;">
<!-- 주제 선택 화면 -->
<div class="topic-screen active" id="topicScreen">
<h2 style="font-size:1.05rem;font-weight:700;margin-bottom:4px;">📋 퀴즈 주제 선택</h2>
<p style="font-size:0.84rem;color:var(--sub);margin-bottom:16px;">풀고 싶은 주제를 선택하세요. 여러 개를 선택하면 섞여서 출제됩니다.</p>
<div id="topicList"></div>
<div class="btn-row">
<button class="btn btn-outline" onclick="selectAll()">전체 선택</button>
<button class="btn btn-outline" onclick="selectNone()">전체 해제</button>
<button class="btn btn-primary" onclick="startQuiz()">🚀 퀴즈 시작</button>
</div>
</div>
<!-- 퀴즈 화면 -->
<div class="quiz-screen" id="quizScreen">
<div class="progress-wrap"><div class="progress-info"><span id="qNum"></span><span id="qScore"></span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>

<div class="q-text" id="qText"></div>
<div class="options" id="qOpts"></div>
<div class="feedback" id="qFeedback"></div>
<div class="next-wrap" id="nextWrap" style="display:none"><button class="btn btn-primary" onclick="nextQuestion()">다음 문제 →</button></div>
</div>
</div>
<!-- 결과 화면 -->
<div class="result-screen" id="resultScreen">
<div class="result-card" id="resultCard"></div>
<div class="btn-row" style="justify-content:center;margin-top:16px">
<button class="btn btn-outline" onclick="goTopics()">주제 다시 선택</button>
<button class="btn btn-primary" onclick="retryWrong()">❌ 틀린 문제만 다시 풀기</button>
</div>
</div>
</main>
<footer class="site-footer"><div class="container"><p><strong>문시중 역사 클래스</strong></p><p>수업 자료는 계속 업데이트됩니다.</p></div></footer>
<script>
const TOPIC_GROUPS = [["Ⅳ. 조선의 성립과 발전", [[1, "조선 건국과 한양 천도"], [2, "유교 통치 체제와 사대교린"], [3, "유교 윤리 보급과 사회 변화"], [4, "사림의 성장과 붕당 형성"], [5, "훈민정음 창제와 과학 기술"], [6, "임진왜란의 발발과 극복"], [7, "전후 복구와 광해군의 중립 외교"], [8, "정묘호란·병자호란과 국제 질서"]]], ["Ⅴ. 조선 사회의 변동", [[9, "양 난 이후 국가를 재건하다"], [10, "영조·정조의 탕평 정치와 세도 정치"], [11, "향촌 사회가 흔들리다"], [12, "삼정의 문란과 농민의 의식 성장"], [13, "새로운 학문적 경향이 나타나다"], [14, "동아시아, 문화를 교류하다"], [15, "생활과 문화의 새로운 양상"]]], ["Ⅵ. 근·현대 사회의 전개", [[16, "문호 개방과 개화 정책"], [17, "국민 국가 수립을 위한 노력"], [18, "일제에 맞서 민족 운동을 전개하다"], [19, "독립 노력과 대한민국 정부 수립"], [20, "식민지 경제 체제로 재편되다"], [21, "국가 주도의 경제 성장"], [22, "신자유주의 경제 정책과 노동 운동"], [23, "대중문화가 발전하다"], [24, "제헌 헌법과 민주주의 지향"], [25, "4·19 혁명"], [26, "민주주의, 시련을 겪다"], [27, "6월 민주 항쟁"], [28, "6·25 전쟁과 분단 고착"], [29, "평화 통일을 위한 노력"]]]];

const ALL_QUESTIONS = [
  {"t": 1, "q": "위화도 회군에 대한 설명으로 옳은 것은?", "o": ["왜구를 토벌하기 위해 이성계가 일본으로 출병한 사건이다.", "명의 철령 이북 요구와 요동 정벌 추진 속에서 이성계가 군대를 돌린 사건이다.", "과전법 실시 이후 정도전이 군사를 이끌고 일으킨 사건이다.", "신진 사대부가 한양으로 천도한 뒤 일어난 사건이다.", "광해군이 중립 외교를 위해 군대를 철수한 사건이다."], "a": 1, "e": "1388년, 명의 철령위 설치 요구에 최영이 요동 정벌을 추진하자, 이성계가 4불가론을 내세우며 위화도에서 회군했습니다."},
  {"t": 1, "q": "과전법에 대한 설명으로 가장 적절한 것은?", "o": ["농민에게 토지를 균등하게 나누어 준 제도이다.", "토지의 사유권을 완전히 인정한 근대적 제도이다.", "불교 사원에 토지를 지급해 왕실을 지원하게 한 제도이다.", "관리에게 등급에 따라 수조권을 지급하여 새 지배층의 경제 기반을 마련한 제도이다.", "일본과의 무역 확대를 위해 항구 주변 토지를 상인에게 지급한 제도이다."], "a": 3, "e": "과전법은 신진사대부에게 수조권(세금 걷을 권리)을 지급하여 경제적 기반을 마련한 제도입니다."},
  {"t": 1, "q": "조선 건국 과정에서 신진 사대부의 분화에 대한 설명으로 옳은 것은?", "o": ["급진파와 온건파 모두 조선 건국에 적극 찬성하였다.", "온건파는 고려를 무너뜨리고 새 왕조를 세우려 하였다.", "급진파는 이성계와 함께 조선 건국을 주도하였다.", "급진파는 정몽주를 중심으로 고려 유지를 주장하였다.", "온건파와 급진파의 차이는 불교 수용 여부에만 있었다."], "a": 2, "e": "급진파(정도전 등)는 이성계와 함께 역성혁명을 주도했고, 온건파(정몽주 등)는 고려 유지를 주장했습니다."},
  {"t": 1, "q": "조선이 한양으로 천도한 이유로 가장 적절한 것은?", "o": ["왜구의 침입을 막기 위해 해안과 가까운 곳이 필요해서", "불교 사찰이 많아 종교 중심 도시를 만들기 위해", "몽골과의 교역을 확대하기 위해 북방에 가까운 곳이 필요해서", "기존 개경의 상업 세력을 강화하기 위해", "수륙 교통이 편리하고, 유교 정치 질서를 도시 구조에 반영하기에 적합했기 때문에"], "a": 4, "e": "한양은 수륙 교통이 편리하고 풍수지리적으로 적합하며, 유교 이상국가의 도시 구조를 반영하기 좋았습니다."},
  {"t": 2, "q": "조선의 중앙 정치 운영에 대한 설명으로 옳은 것은?", "o": ["의정부는 지방 군현을 직접 통치하는 기관이었다.", "6조는 외교만 담당하고 행정은 모두 의정부가 맡았다.", "의정부는 주요 정책을 논의하고, 6조는 실무 행정을 담당하였다.", "사헌부와 사간원은 모두 군사 지휘 기관이었다.", "홍문관은 세금 징수만 담당하였다."], "a": 2, "e": "의정부는 최고 정책 심의 기관이고, 6조(이·호·예·병·형·공)는 실무 행정을 분담했습니다."},
  {"t": 2, "q": "조선의 3사에 대한 설명으로 가장 적절한 것은?", "o": ["왕명을 기록하고 역사서를 편찬하는 기관만을 뜻한다.", "관리의 비리를 감찰하고 왕의 정치를 비판하는 등 언론 기능을 담당하였다.", "외국 사신을 맞이하고 통역을 전담하는 기관이다.", "과거 시험만을 전담하여 주관하던 교육 기관이다.", "유사시 의병을 조직하기 위해 만들어진 민간 단체이다."], "a": 1, "e": "3사(사헌부·사간원·홍문관)는 관리 감찰과 간쟁(왕에 대한 비판) 등 언론 기능을 담당했습니다."},
  {"t": 2, "q": "사대교린 외교에 대한 설명으로 옳은 것은?", "o": ["명, 여진, 일본 모두에게 같은 방식으로 외교하였다.", "명에는 교린, 일본에는 사대를 적용하였다.", "명과의 관계는 형식적이었고 실질적 교류는 전혀 없었다.", "명에는 사대, 여진과 일본 등에는 교린을 적용하였다.", "주변국과의 모든 교류를 끊는 쇄국 정책이었다."], "a": 3, "e": "사대(명) + 교린(여진·일본): 강대국에는 사대, 이웃 나라와는 교린으로 외교했습니다."},
  {"t": 2, "q": "세종 때 4군 6진 개척의 의의로 가장 적절한 것은?", "o": ["일본과의 무역 항구를 확대하였다.", "압록강과 두만강 일대로 북방 국경을 확정 짓고 안정시켰다.", "수도를 한양에서 개경으로 임시로 옮겼다.", "불교 세력을 북방에 이주시켜 통제하였다.", "명과의 사대 관계를 자발적으로 끊었다."], "a": 1, "e": "4군 6진 개척으로 압록강·두만강을 경계로 하는 현재와 비슷한 북방 국경선을 확정했습니다."},
  {"t": 3, "q": "국가의 다섯 가지 주요 의례를 유교 예법에 따라 정리하여 편찬한 책은?", "o": ["삼강행실도", "주자가례", "국조오례의", "동국문헌비고", "훈민정음"], "a": 2, "e": "국조오례의는 국가와 왕실의 5가지 의례(길례·가례·빈례·군례·흉례)를 유교 예법에 따라 정리한 책입니다."},
  {"t": 3, "q": "백성들에게 효자, 충신, 열녀의 행적을 그림과 함께 쉽게 전달하려 한 책은?", "o": ["농사직설", "삼강행실도", "택리지", "발해고", "속대전"], "a": 1, "e": "삼강행실도는 효자·충신·열녀의 이야기를 글과 그림으로 표현하여 백성의 유교 윤리 이해를 도왔습니다."},
  {"t": 3, "q": "조선에서 관혼상제 등의 일상 의례를 유교식 생활 규범으로 정착시키는 데 큰 영향을 준 것은?", "o": ["징병과 징용", "북학론과 중상학파", "소학과 주자가례", "훈민정음과 의방유취", "경국대전과 대전통편"], "a": 2, "e": "소학(아동 유교 교육)과 주자가례(관혼상제 예법)가 유교적 일상생활 규범의 핵심 교재였습니다."},
  {"t": 3, "q": "향약에 대한 설명으로 가장 적절한 것은?", "o": ["중앙 정부가 직접 파견한 관리들의 군사 훈련 지침서였다.", "마을의 상업 활동과 무역만을 장려하기 위한 규정이었다.", "백성의 자치와 상호 부조를 내세우면서도 사림의 향촌 통제 수단이 되었다.", "불교 신앙을 지방으로 보급하기 위해 만든 마을 규약이었다.", "일본과의 외교 문서를 정리하여 향촌에 배포한 책이다."], "a": 2, "e": "향약은 유교 윤리에 기반한 자치 규약이지만, 사림이 향촌 사회를 장악하는 수단으로도 활용되었습니다."},
  {"t": 4, "q": "사림 세력에 대한 설명으로 옳은 것은?", "o": ["조선 건국을 주도한 공신들을 중심으로 형성된 정치 세력이다.", "지방에서 성리학을 연구하고 제자를 양성하며 성장한 세력이다.", "불교 교단을 경제적 기반으로 삼아 성장한 세력이다.", "주로 왜구 토벌 과정에서 힘을 키운 무인 집단이다.", "상업 자본을 바탕으로 한양 등 도시에서 등장한 세력이다."], "a": 1, "e": "사림은 지방에서 서원·향약을 기반으로 성리학을 연구하며 성장한 세력입니다."},
  {"t": 4, "q": "다음 중 사림이 훈구 세력으로부터 큰 피해를 입은 4대 사화에 해당하지 않는 것은?", "o": ["무오사화", "갑자사화", "기묘사화", "을사사화", "병자호란"], "a": 4, "e": "4대 사화: 무오(1498)→갑자(1504)→기묘(1519)→을사(1545). 병자호란은 1636년 청의 침입입니다."},
  {"t": 4, "q": "사화로 피해를 입은 사림이 지방에서 세력을 키운 기반은?", "o": ["훈련도감과 어영청", "서원과 향약", "시전과 공인", "집현전과 규장각", "동의보감과 의방유취"], "a": 1, "e": "서원(교육·결속)과 향약(향촌 자치)이 사림의 지방 기반이었습니다."},
  {"t": 4, "q": "붕당이 처음 형성된 직접적 계기로 가장 적절한 것은?", "o": ["훈민정음 창제에 대한 찬반 논쟁", "농촌 지역의 동학 확산 문제", "이조 전랑 임명 문제와 척신 정치 청산 방식의 차이", "임진왜란 발발에 대한 책임론", "광해군의 중립 외교 추진"], "a": 2, "e": "선조 대에 이조 전랑 임명과 척신 정치 청산 방식을 둘러싼 갈등으로 동인·서인이 나뉘었습니다."},
  {"t": 5, "q": "세종이 훈민정음을 창제한 주된 목적으로 가장 적절한 것은?", "o": ["양반 사대부들의 한문학 수준을 높이기 위해", "중국과 주고받는 외교 문서의 형식을 통일하기 위해", "한자를 모르는 백성이 우리말을 쉽게 표기하고 익히게 하기 위해", "일본과의 무역을 확대하여 경제를 부흥시키기 위해", "불교 경전을 한자로 번역하여 널리 보급하기 위해"], "a": 2, "e": "훈민정음 서문: 백성이 말하고자 하는 바를 표현할 수 있게 하려는 애민 정신이 목적입니다."},
  {"t": 5, "q": "최만리 등이 훈민정음 창제에 반대한 이유로 가장 적절한 것은?", "o": ["새 문자가 백성들의 농업 생산력을 떨어뜨린다고 보아서", "중국 중심의 세계관 속에서 고유 문자를 만드는 것이 문명국의 질서를 해친다고 보아서", "국가의 중요 군사 기밀이 백성에게 쉽게 유출될 수 있다고 보아서", "문자가 보급되면 신하들의 세력이 강해져 왕권이 약해질 것이라 보아서", "이미 백성들이 한자를 충분히 잘 알고 있어 새 문자가 필요 없다고 보아서"], "a": 1, "e": "최만리 등은 중화 질서 속에서 고유 문자 사용이 문명국의 체계를 해친다고 반대했습니다."},
  {"t": 5, "q": "조선 전기 천문·지리 분야의 성과로 옳지 않은 것은?", "o": ["고구려의 천문도를 바탕으로 한 천상열차분야지도", "한양을 기준으로 천체 운동을 계산한 칠정산", "아프리카와 유럽까지 그려 넣은 혼일강리역대국도지도", "심리를 뜻하는 눈금이 표시된 대동여지도", "천체의 운행과 위치를 관측하는 천문 기구인 간의"], "a": 3, "e": "대동여지도는 조선 후기 김정호가 제작한 지도입니다. 조선 전기 성과가 아닙니다."},
  {"t": 5, "q": "측우기에 대한 설명으로 가장 적절한 것은?", "o": ["세계 최초로 발명된 금속 활자이다.", "세계 최초로 강우량을 표준화해 측정한 기구이다.", "밤하늘 별의 움직임을 관측하여 시간을 측정하는 천문 기구이다.", "전투에서 적을 향해 화포를 쏘는 방어 장치이다.", "서양 선교사가 들여와 전염병 치료에 사용한 의학 기구이다."], "a": 1, "e": "측우기는 세종 때 발명된 세계 최초의 체계적 강우량 측정 기구입니다."},
  {"t": 6, "q": "임진왜란 발발의 배경으로 가장 적절한 것은?", "o": ["조선이 대륙 진출을 위해 먼저 일본을 침략하였기 때문에", "일본을 통일한 도요토미 히데요시가 대륙 침략을 추진했기 때문에", "명나라가 조선에 일본 정벌을 위한 군대 출병을 강요했기 때문에", "북방의 여진족이 성장하여 조선 남부까지 압박했기 때문에", "조선이 일본 상인들과의 무역을 일방적으로 중단했기 때문에"], "a": 1, "e": "도요토미 히데요시가 전국 시대를 통일한 뒤, 내부 불만을 돌리기 위해 대륙 침략을 추진했습니다."},
  {"t": 6, "q": "임진왜란 초기 조선군이 크게 밀린 이유로 가장 적절한 것은?", "o": ["전쟁 발발 직전 조선 수군이 모두 해산되었기 때문에", "일본군이 기동력이 뛰어난 기병만으로 구성되어 있었기 때문에", "조선은 오랜 평화로 군사 대비가 부족했던 반면, 일본군은 조총으로 무장하고 실전 경험이 풍부했기 때문에", "명나라가 일본을 암묵적으로 지원하며 조선을 배신했기 때문에", "조선이 화약 무기의 존재를 전혀 몰라 방어할 수 없었기 때문에"], "a": 2, "e": "조선은 200년간의 평화로 군사 대비가 부족했고, 일본군은 조총과 실전 경험을 갖추고 있었습니다."},
  {"t": 6, "q": "한산도 대첩의 특징으로 가장 적절한 것은?", "o": ["조선 관군이 육지에서 매복하여 일본군을 포위 섬멸한 전투이다.", "학익진 전술을 활용하여 일본 수군을 크게 물리치고 제해권을 장악한 해전이다.", "조·명 연합군이 일본군에게 빼앗긴 평양성을 탈환한 전투이다.", "정유재란 시기 명량 해협의 물살을 이용한 승리이다.", "인질로 끌려갔던 소현 세자가 참전하여 공을 세운 전투이다."], "a": 1, "e": "이순신이 학익진(학의 날개 진형)으로 왜선 63척을 격파하고 서해 진출을 차단한 해전입니다."},
  {"t": 6, "q": "임진왜란을 동아시아 국제전으로 볼 수 있는 이유로 가장 적절한 것은?", "o": ["조선 내부의 붕당 싸움이 전쟁의 주된 원인이자 과정이었기 때문에", "전쟁의 결과가 조선, 명, 일본, 후금 등 동아시아 각국의 정세 변화에 큰 영향을 주었기 때문에", "모든 전투가 한반도가 아닌 만주와 일본 본토에서 벌어졌기 때문에", "일본과 후금이 비밀리에 연합군을 결성하여 조선을 공격했기 때문에", "전쟁 직후 조선이 즉시 청나라의 속국으로 편입되었기 때문에"], "a": 1, "e": "임진왜란 결과: 조선 국토 황폐화, 명 국력 약화→멸망, 일본 정권 교체(에도 막부), 후금 성장 등 동아시아 전체에 영향을 미쳤습니다."},
  {"t": 7, "q": "광해군이 추진한 전후 복구 정책으로 옳은 것은?", "o": ["일제의 강요에 따른 신사 참배 강요", "파괴된 산업 부흥을 위한 토지 대장(양전)과 호적 정비", "청의 요구에 따른 삼전도비 건립", "국가 안보를 위한 청과의 군신 관계 수용", "황국 신민화를 목적으로 한 창씨개명 실시"], "a": 1, "e": "광해군은 임진왜란 이후 양전·호적 정비, 대동법 확대, 동의보감 편찬 등 전후 복구에 힘썼습니다."},
  {"t": 7, "q": "광해군의 중립 외교에 대한 설명으로 가장 적절한 것은?", "o": ["명과 후금 중 후금만을 적극적으로 지원한 외교", "대륙 정세를 무시하고 일본만을 우선시한 해양 외교", "쇠퇴하는 명과 성장하는 후금 어느 한쪽에 치우치지 않으려 한 실리 외교", "주변의 모든 나라와 외교 관계를 단절한 쇄국 외교", "병자호란을 피하기 위해 청과의 군신 관계를 자발적으로 받아들인 외교"], "a": 2, "e": "광해군은 명·후금 사이에서 실리적 중립을 유지하며 강홍립에게 형세를 살피라는 밀명을 내렸습니다."},
  {"t": 7, "q": "사르후 전투와 관련된 설명으로 옳은 것은?", "o": ["이순신이 명량에서 일본 수군을 크게 격파한 전투이다.", "명의 지원 요청에 따라 강홍립이 조선군을 이끌고 참전하였다.", "광해군이 직접 군대를 이끌고 전장에서 지휘하였다.", "조선군이 주도적으로 후금의 본거지를 기습하여 무찌른 전투이다.", "병자호란 직후 남한산성 인근에서 벌어진 최후의 항전이다."], "a": 1, "e": "명의 요청으로 강홍립이 조선군을 이끌고 사르후 전투에 참전했으나, 광해군의 밀명에 따라 상황을 관망했습니다."},

  {"t": 12, "q": "삼정 중 전정의 문란에 대한 설명으로 가장 적절한 것은?", "o": ["지주들의 반발로 토지세를 완전히 없앤 것이다.", "정해진 토지세 외에 여러 가지 명목의 부가세를 덧붙여 농민에게 과도한 부담을 주었다.", "군포를 2필에서 1필로 절반으로 줄인 것이다.", "흉년에 빈민에게 곡식을 무료로 배급한 것이다.", "일본 상인에게 토지를 헐값에 넘긴 것이다."], "a": 1, "e": "전정 문란: 본래 토지세 외에 갖가지 부가세(결작 등)를 추가 징수하여 농민 부담이 급증했습니다."},
  {"t": 12, "q": "삼정 중 군정의 문란 사례로 옳은 것을 모두 포함한 것은?", "o": ["황구첨정(어린아이에게 군포), 백골징포(죽은 사람에게 군포)", "방납, 공명첩", "대동법, 균역법", "주화론, 주전론", "향약, 서원"], "a": 0, "e": "군정 문란: 황구첨정·백골징포·인징(이웃 몫 전가) 등으로 남은 농민의 부담이 가중되었습니다."},
  {"t": 12, "q": "삼정 중 환곡의 문란에 대한 설명으로 옳은 것은?", "o": ["빈민 구제라는 본래 목적대로 충실히 운영되었다.", "곡식을 원하지 않는 백성에게도 강제로 빌리게 하고 높은 이자를 거두었다.", "이웃 나라와 곡식을 거래하던 무역 제도였다.", "군포 부담을 줄이기 위해 쌀로 군역을 대신 내도록 한 법이었다.", "부유한 상민이 곡식을 바치고 신분을 상승할 수 있도록 돕는 제도였다."], "a": 1, "e": "환곡 문란: 강제 대여 + 모래 섞기 + 높은 이자 → 빈민 구제가 아닌 수탈 수단으로 변질"},
  {"t": 13, "q": "조선 후기 실학에 대한 설명으로 가장 적절한 것은?", "o": ["불교 교리 연구를 중심으로 일어난 학문이다.", "성리학의 공리공론을 비판하고, 현실 문제 해결을 중시한 실용적·실증적 학문이다.", "일본의 서구 문화를 모방하려는 학문 경향이다.", "왕실의 의례와 역사를 연구한 학문이다.", "과거 시험 합격을 위한 암기법을 정리한 학문이다."], "a": 1, "e": "실학은 성리학의 한계를 비판하고, 토지·상공업 등 현실 문제 해결을 추구한 학문입니다."},
  {"t": 13, "q": "중농학파를 주장한 실학자들로 묶인 것은?", "o": ["유형원, 이익, 정약용", "최만리, 정도전, 정몽주", "김옥균, 박영효, 서재필", "김홍도, 신윤복, 정선", "유득공, 김정호, 안정복"], "a": 0, "e": "중농학파(농업 중심 개혁론): 유형원(균전제)·이익(한전제)·정약용(여전제)"},
  {"t": 13, "q": "중상학파(북학파)의 주장으로 가장 적절한 것은?", "o": ["청나라를 철저히 배척하고 전통 농업만을 국가의 근본으로 삼아야 한다.", "상공업 진흥과 청나라의 발달한 문물과 기술을 적극적으로 수용해야 한다.", "양반의 특권과 신분 차별을 더욱 강화해야 한다.", "서양 과학 기술을 막기 위해 불교 사찰을 늘려야 한다.", "서양 무기를 수입하고 일본식 근대 군사 제도를 도입해야 한다."], "a": 1, "e": "중상학파(박지원·박제가 등): 상공업 진흥 + 청의 선진 문물 수용을 주장했습니다."},
  {"t": 13, "q": "국학의 발달과 관련된 설명으로 옳지 않은 것은?", "o": ["유득공은 발해고를 저술하여 남북국 시대라는 용어를 사용하였다.", "안정복은 동사강목을 저술하여 우리 역사를 체계적으로 정리하였다.", "김정호는 대동여지도를 만들었다.", "신경준은 훈민정음운해로 한글을 연구하였다.", "박지원은 동의보감을 완성하였다."], "a": 4, "e": "동의보감은 허준의 저술입니다. 박지원은 열하일기·양반전 등을 쓴 중상학파 실학자입니다."},
  {"t": 14, "q": "조선 후기 청나라에 파견된 공식 외교 사절단은?", "o": ["통신사", "연행사", "수신사", "조사 시찰단", "영선사"], "a": 1, "e": "연행사는 청의 수도 연경(베이징)에 파견된 사절로, 서양 문물 수용의 창구 역할을 했습니다."},
  {"t": 14, "q": "천주교가 조선 사회에서 박해받은 이유로 가장 적절한 것은?", "o": ["무력 대응을 위해 조총과 화약 무기 사용을 장려했기 때문에", "인간 평등과 제사 부정 교리가 신분제와 성리학 질서와 정면으로 충돌했기 때문에", "선교사들이 일본의 문화를 지나치게 찬양했기 때문에", "농업 기술과 상업적 이익만을 강조했기 때문에", "왕권 절대화를 주장하여 사림의 반발을 샀기 때문에"], "a": 1, "e": "천주교의 인간 평등 사상과 제사 부정은 조선의 신분제·성리학 질서와 정면으로 충돌했습니다."},
  {"t": 14, "q": "통신사에 대한 설명으로 옳은 것은?", "o": ["병자호란 이후 청에 조공을 바치기 위해 파견된 사절이다.", "임진왜란 이후 일본 막부의 요청으로 파견되어 문화 사절단의 역할을 하였다.", "임시 정부가 독립 승인을 위해 국제 연맹에 파견한 사절이다.", "태종 때부터 명나라에 조공을 바치기 위해 다녀온 사절이다.", "흥선 대원군이 미국에 개항을 요청하기 위해 파견한 사절이다."], "a": 1, "e": "통신사: 일본 에도 막부의 요청으로 파견 → 외교 + 조선 문화 전파 역할"},
  {"t": 14, "q": "조선 후기 문학과 회화의 새로운 변화로 가장 적절한 것은?", "o": ["중국의 이상적 풍경만을 그리는 관념 산수화가 더욱 강해졌다.", "한글 소설·사설시조 등이 유행하고, 진경산수화와 풍속화가 나타났다.", "불교 경전의 삽화와 불화만이 유행하였다.", "궁중 행사만을 다루는 기록화로 획일화되었다.", "서양 문물의 영향으로 전통 회화는 완전히 쇠퇴하였다."], "a": 1, "e": "진경산수화(정선), 풍속화(김홍도·신윤복), 한글 소설(춘향전) 등 서민 문화가 발달했습니다."},
  {"t": 15, "q": "조선 후기 성리학적 질서가 강화되면서 나타난 가족 제도 변화로 가장 적절한 것은?", "o": ["균분 상속이 더욱 철저하게 지켜졌다.", "남귀여가혼(처가살이)이 더욱 일반화되었다.", "적장자 중심의 상속과 부계 혈통 중심의 가부장적 질서가 확고해졌다.", "족보 편찬이 완전히 사라졌다.", "신랑이 신부의 집에서 영구히 거주하였다."], "a": 2, "e": "조선 후기: 균분상속→장자 중심 상속, 처가살이→시가살이, 윤회봉사→장자 제사 주관"},
  {"t": 15, "q": "조선 후기 농업 생산력을 획기적으로 발달시킨 대표적 영농 방법은?", "o": ["모내기법(이앙법) 보급", "농사직설 폐기", "전시과 제도 부활", "음서 제도 확대", "서원 철폐"], "a": 0, "e": "이앙법: 이모작 가능 + 김매기 노동력 절감 → 광작 → 부농/빈농 분화의 원인"},
  {"t": 15, "q": "조선 후기 성장한 상인층으로 올바르게 묶인 것은?", "o": ["사헌부, 사간원, 홍문관", "임진왜란 때 활약한 의병", "경강상인, 보부상, 객주", "조선 전기 훈구파", "불교 사찰을 중심으로 일어난 승병"], "a": 2, "e": "경강상인(한강), 보부상(전국 장시), 객주(포구 중개) 등이 조선 후기 대표 상인층입니다."},
  {"t": 15, "q": "조선 후기 서민 문화의 특징으로 가장 적절한 것은?", "o": ["양반만이 향유할 수 있는 어려운 한문 문학이 중심이었다.", "감정의 자유로운 표현, 서민들의 삶, 부패한 양반 사회에 대한 풍자가 돋보였다.", "불교의 내세관을 반영한 불교 미술만이 발달하였다.", "왕실의 위엄과 의례를 알리는 것을 중심으로 한 문화였다.", "일본 막부의 미학적 요구에 따른 문화였다."], "a": 1, "e": "서민 문화: 판소리·탈춤·한글소설·민화 등에서 사회 비판과 감정 표현이 자유로웠습니다."},
  {"t": 16, "q": "1876년 강화도 조약에 대한 설명으로 옳은 것은?", "o": ["조선이 일본에 치외법권을 행사할 수 있도록 인정한 조약이다.", "조선이 자주국임을 내세웠으나 해안 측량권 등을 내준 일본에 유리한 불평등 조약이었다.", "임오군란 직후 청이 강요하여 맺은 조약이다.", "러시아의 남하를 막기 위해 맺은 최초의 근대적 조약이다.", "흥선 대원군의 쇄국 의지가 반영된 조약이다."], "a": 1, "e": "강화도 조약: 형식상 자주국이지만 치외법권·해안측량권·무관세 등 불평등한 내용이 핵심입니다."},
  {"t": 16, "q": "흥선 대원군의 대외 정책으로 옳은 것은?", "o": ["적극적인 개항 추진", "척화비를 건립하며 통상 수교 거부 정책", "청과의 군신 관계 수용", "천주교를 인정하는 서학 장려 정책", "일본과의 자유 무역 확대"], "a": 1, "e": "흥선 대원군: 척화비 건립 + 병인양요·신미양요를 겪으며 통상 수교 거부 정책을 고수했습니다."},
  {"t": 16, "q": "1882년 임오군란에 대한 설명으로 가장 적절한 것은?", "o": ["급진 개화파가 일본의 힘을 빌려 일으킨 정변이다.", "신식 군대에 비해 차별 대우를 받던 구식 군인과 도시 빈민의 불만이 폭발한 사건이다.", "전라도 농민들이 반봉건·반외세를 외치며 일어난 봉기이다.", "조선 정부가 군대를 동원하여 청나라 군대를 몰아낸 전쟁이다.", "을사늑약에 반발하여 군인들이 일으킨 사건이다."], "a": 1, "e": "임오군란: 구식 군인(별기군과의 차별)·도시 빈민 불만 폭발 → 청군 개입으로 진압"},
  {"t": 16, "q": "갑신정변과 동학 농민 운동을 비교한 설명으로 옳은 것은?", "o": ["둘 다 일본군의 개입으로 실패하며 식민 통치를 완성하는 계기가 된 사건이다.", "갑신정변은 지식인 중심의 위로부터의 급진 개혁이었고, 동학 농민 운동은 농민 중심의 아래로부터의 개혁 운동이었다.", "둘 다 청나라 군대의 지원으로 성공하였다.", "둘 다 불교 세력의 권리를 회복하는 것을 주된 목표로 하였다.", "갑신정변은 농민 주도, 동학은 개화파 관료들이 일으켰다."], "a": 1, "e": "갑신정변: 위로부터의 급진 개혁(3일 천하), 동학농민운동: 아래로부터의 대중적 개혁"},
  {"t": 17, "q": "1897년 대한 제국 수립의 역사적 의미로 가장 적절한 것은?", "o": ["서구 열강의 압박에 굴복하여 일본의 보호국이 되었음을 선언한 것이다.", "아관파천 이후 고종이 칭제건원하여 자주독립국임을 대내외에 선언한 것이다.", "미국의 경제적 식민지가 되었음을 헌법에 명시한 것이다.", "고려 시대의 귀족 사회로 되돌린 것이다.", "민주 공화정을 선포한 것이다."], "a": 1, "e": "대한 제국: 고종이 황제를 칭하고(칭제건원) 청으로부터의 자주독립을 대내외에 선언한 것입니다."},
  {"t": 17, "q": "광무개혁에 대한 설명으로 옳은 것은?", "o": ["구본신참의 원칙 아래 황제 중심의 점진적 근대화를 추진하였다.", "조선 통감부가 시행한 식민 통치 정책이다.", "동학 농민군이 집강소를 설치하고 주도적으로 실천한 개혁이다.", "불교 부흥만을 목표로 하였다.", "외교권을 포기하는 것을 핵심 내용으로 하였다."], "a": 0, "e": "광무개혁: 구본신참(옛것 근본 + 새것 참고) 원칙, 양전·상공업 진흥 등 점진적 근대화"},
  {"t": 17, "q": "독립 협회의 주요 활동으로 가장 적절한 것은?", "o": ["삼전도비 건립 및 보존 운동", "만민 공동회를 개최하여 이권 수호와 자주독립, 자유 민권 의식 확산", "한글 맞춤법 통일안 제정을 위한 조선어학회 조직", "한국 광복군 창설 지원", "신간회 결성 주도"], "a": 1, "e": "독립 협회: 만민공동회(민중 참여) + 관민공동회(관민 협력) → 자주독립·자유민권 의식 확산"},

  {"t": 29, "q": "1991년 남북 기본 합의서에 대한 설명으로 가장 적절한 것은?", "o": ["상대방 체제를 인정하지 않고 흡수 통일할 것을 명시하였다.", "상호 체제 인정, 불가침, 교류와 협력 확대 등을 담았다.", "6·25 전쟁 직후 1950년대에 체결되었다.", "단일 연방 국가를 즉시 수립하기로 약속하였다.", "군사적 적대 행위 중단만을 다루었다."], "a": 1, "e": "남북기본합의서(1991): 상호 체제 인정 + 불가침 + 교류·협력 확대가 핵심입니다."},
  {"t": 29, "q": "6·15 남북 공동 선언의 내용으로 가장 적절한 것은?", "o": ["통일 문제를 우리 민족끼리 자주적으로 해결해 나가기로 합의하였다.", "군사적 통합을 우선하여 즉시 연방 국가를 만들기로 선언하였다.", "유신 헌법을 남북이 공동으로 폐지하기로 결의하였다.", "일본과의 국교 정상화를 최우선으로 추진하였다.", "양측 군부의 정치 개입을 상호 중단하기로 합의하였다."], "a": 0, "e": "6·15 선언(2000): 통일의 자주적 해결 + 이산가족 상봉 + 경제·사회·문화 교류 합의"},

];


// ── State ──
let selectedTopics = new Set();
let questions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let wrongList = [];

// ── Topic selector ──
function renderTopics() {
  const el = document.getElementById('topicList');
  let html = '';
  for (const [era, topics] of TOPIC_GROUPS) {
    html += `<div class="era-group"><div class="era-group-title">${era}</div><div class="topic-grid">`;
    for (const [id, name] of topics) {
      html += `<div class="topic-check" data-id="${id}" onclick="toggleTopic(${id},this)"><span class="topic-cb">✓</span><span>${name}</span></div>`;
    }
    html += '</div></div>';
  }
  el.innerHTML = html;
}
function toggleTopic(id, label) {
  if (selectedTopics.has(id)) { selectedTopics.delete(id); label.classList.remove('checked'); }
  else { selectedTopics.add(id); label.classList.add('checked'); }
}
function selectAll() {
  selectedTopics.clear();
  document.querySelectorAll('.topic-check').forEach(l => {
    const id = parseInt(l.dataset.id);
    selectedTopics.add(id);
    l.classList.add('checked');
  });
}
function selectNone() {
  selectedTopics.clear();
  document.querySelectorAll('.topic-check').forEach(l => l.classList.remove('checked'));
}

// ── Quiz start ──
function startQuiz() {
  if (selectedTopics.size === 0) { alert('주제를 1개 이상 선택하세요!'); return; }
  questions = ALL_QUESTIONS.filter(q => selectedTopics.has(q.t));
  // Shuffle
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIdx = 0; score = 0; wrongList = [];
  showScreen('quizScreen');
  renderQuestion();
}

// ── Render question ──
function renderQuestion() {
  answered = false;
  const q = questions[currentIdx];
  const topicName = TOPIC_GROUPS.flatMap(g => g[1]).find(t => t[0] === q.t)?.[1] || '';
  document.getElementById('qNum').textContent = `${currentIdx + 1} / ${questions.length}`;
  document.getElementById('qScore').textContent = `정답 ${score}개`;
  document.getElementById('progressFill').style.width = ((currentIdx / questions.length) * 100) + '%';
  document.getElementById('qTopic').textContent = topicName;
  document.getElementById('qText').textContent = q.q;
  const nums = ['①','②','③','④','⑤'];
  document.getElementById('qOpts').innerHTML = q.o.map((opt, i) =>
    `<button class="opt-btn" onclick="checkAnswer(${i})"><span class="opt-num">${nums[i]}</span><span>${opt}</span></button>`
  ).join('');
  document.getElementById('qFeedback').className = 'feedback';
  document.getElementById('qFeedback').innerHTML = '';
  document.getElementById('nextWrap').style.display = 'none';
  // Re-trigger animation
  const card = document.getElementById('qCard');
  card.classList.remove('fade-in');
  void card.offsetWidth;
  card.classList.add('fade-in');
}

function checkAnswer(idx) {
  if (answered) return;
  answered = true;
  const q = questions[currentIdx];
  const btns = document.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('disabled'));

  if (idx === q.a) {
    score++;
    btns[idx].classList.add('correct');
    const fb = document.getElementById('qFeedback');
    fb.className = 'feedback show correct-fb';
    fb.innerHTML = `<strong>⭕ 정답!</strong>${q.e}`;
  } else {
    btns[idx].classList.add('wrong');
    btns[q.a].classList.add('show-correct');
    const fb = document.getElementById('qFeedback');
    fb.className = 'feedback show wrong-fb';
    fb.innerHTML = `<strong>❌ 오답</strong>${q.e}`;
    wrongList.push(q);
  }
  document.getElementById('qScore').textContent = `정답 ${score}개`;

  if (currentIdx < questions.length - 1) {
    document.getElementById('nextWrap').style.display = 'block';
  } else {
    setTimeout(showResult, 800);
  }
}

function nextQuestion() {
  currentIdx++;
  renderQuestion();
}

// ── Result ──
function showResult() {
  showScreen('resultScreen');
  const pct = Math.round((score / questions.length) * 100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '😊' : pct >= 50 ? '💪' : '📚';
  let html = `<div class="result-emoji">${emoji}</div>`;
  html += `<div class="result-score">${score} / ${questions.length}</div>`;
  html += `<div class="result-sub">정답률 ${pct}%</div>`;
  html += `<div class="result-detail">${pct >= 90 ? '훌륭해요! 완벽에 가깝습니다!' : pct >= 70 ? '잘했어요! 조금만 더 복습하면 완벽!' : pct >= 50 ? '괜찮아요! 틀린 문제를 다시 풀어보세요.' : '아직 부족해요. 수업 페이지를 다시 읽어보고 도전하세요!'}</div>`;
  document.getElementById('progressFill').style.width = '100%';

  if (wrongList.length > 0) {
    html += `<div class="wrong-review"><h3>❌ 틀린 문제 (${wrongList.length}개)</h3>`;
    const nums = ['①','②','③','④','⑤'];
    wrongList.forEach(q => {
      const topicName = TOPIC_GROUPS.flatMap(g => g[1]).find(t => t[0] === q.t)?.[1] || '';
      html += `<div class="wrong-item"><div class="wi-q">[${topicName}] ${q.q}</div><div class="wi-a">정답: ${nums[q.a]} ${q.o[q.a]}</div></div>`;
    });
    html += '</div>';
  }
  document.getElementById('resultCard').innerHTML = html;
}

function retryWrong() {
  if (wrongList.length === 0) { alert('틀린 문제가 없습니다!'); return; }
  questions = [...wrongList];
  for (let i = questions.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [questions[i], questions[j]] = [questions[j], questions[i]];
  }
  currentIdx = 0; score = 0; wrongList = [];
  showScreen('quizScreen');
  renderQuestion();
}

function goTopics() {
  showScreen('topicScreen');
}

function showScreen(id) {
  ['topicScreen','quizScreen','resultScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('active', s === id);
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──
renderTopics();

</script>
